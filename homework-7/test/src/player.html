<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="App.css" />
  </head>
  <body>
    <div class="music-player">
      <h4>1. Классы</h4>
      <h1 id="title" class="player-title">Мой музыкальный плеер</h1>
      <hr />

      <h4>2. maxlength</h4>
      <input
        class="form-control"
        type="search"
        id="search"
        placeholder="Поиск музыки"
        maxlength="50"
        value="Начните печатать..."
        disabled
      />
      <hr />

      <h4>3. rows, cols, maxLength, readonly</h4>
      <textarea
        class="form-control"
        placeholder="Оставьте комментарий к треку..."
        rows="3"
        cols="40"
        maxlength="200"
        readonly
        disabled
      ></textarea>
      <hr />

      <h4>4. tabindex</h4>
      <button tabindex="0">Click</button>
      <hr />

      <h4>5. colspan, rowspan</h4>
      <table border="1">
        <tbody>
          <tr>
            <td colspan="2">1</td>
            <td rowspan="3">2</td>
          </tr>
        </tbody>
      </table>
      <hr />

      <h4>6. for</h4>
      <input type="radio" id="repeat-off" name="repeat" />
      <label for="repeat-off">Без повтора</label>
      <hr />
    </div>
  </body>
</html>
